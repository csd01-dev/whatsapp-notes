<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <rect width="512" height="512" rx="120" fill="#6366f1"/>
  <!-- Notepad body -->
  <rect x="120" y="130" width="272" height="320" rx="20" fill="white" opacity="0.15"/>
  <rect x="130" y="140" width="252" height="300" rx="16" fill="white" opacity="0.9"/>
  <!-- Lines on notepad -->
  <line x1="160" y1="200" x2="352" y2="200" stroke="#6366f1" stroke-width="8" stroke-linecap="round"/>
  <line x1="160" y1="240" x2="352" y2="240" stroke="#6366f1" stroke-width="8" stroke-linecap="round"/>
  <line x1="160" y1="280" x2="320" y2="280" stroke="#6366f1" stroke-width="8" stroke-linecap="round"/>
  <line x1="160" y1="320" x2="300" y2="320" stroke="#6366f1" stroke-width="8" stroke-linecap="round"/>
  <!-- Sparkle/AI indicator -->
  <circle cx="352" cy="352" r="60" fill="#818cf8"/>
  <text x="352" y="368" text-anchor="middle" font-size="52" fill="white">✦</text>
  <!-- Spiral binding -->
  <circle cx="160" cy="160" r="14" fill="#6366f1"/>
  <circle cx="200" cy="160" r="14" fill="#6366f1"/>
  <circle cx="240" cy="160" r="14" fill="#6366f1"/>
  <circle cx="280" cy="160" r="14" fill="#6366f1"/>
  <circle cx="320" cy="160" r="14" fill="#6366f1"/>
</svg>
